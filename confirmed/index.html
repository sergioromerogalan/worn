<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuenta confirmada — WØRN</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0A;
      --text: #F5F5F0;
      --volt: #E8FF47;
      --muted: #888888;
      --surface: #1E1E1E;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Volt glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 0;
    }

    /* Logo */
    .logo {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: clamp(40px, 8vw, 72px);
      letter-spacing: 0.12em;
      color: var(--text);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    /* Check */
    .check-wrap {
      margin: 32px 0 24px;
      opacity: 0;
      transform: scale(0.8);
      animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--volt);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-circle svg {
      width: 36px;
      height: 36px;
    }

    /* Text */
    .headline {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: clamp(22px, 4vw, 32px);
      color: var(--text);
      text-align: center;
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
    }

    .subtext {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 320px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--volt);
      margin: 28px 0;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.85s forwards;
    }

    /* CTA */
    .cta {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.95s forwards;
    }

    .cta span {
      color: var(--volt);
      display: block;
      font-size: 16px;
      margin-top: 4px;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeIn 0.4s ease 1.1s forwards;
    }

    /* Volt bar bottom */
    .volt-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--volt);
      width: 0%;
      animation: barFill 2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes barFill {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="volt-bar"></div>

  <div class="container">
    <div class="logo">WØRN</div>

    <div class="check-wrap">
      <div class="check-circle">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 18L15 25L28 11" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <h1 class="headline">Cuenta confirmada</h1>
    <p class="subtext">Tu email ha sido verificado. Ya puedes abrir la app y entrar con tu cuenta.</p>

    <div class="divider"></div>

    <p class="cta">
      Abre la app WØRN
      <span>Your style. Your identity.</span>
    </p>
  </div>

  <div class="footer">© 2026 WØRN · worn.community</div>
</body>
</html>
